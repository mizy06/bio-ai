name: Deploy Bio-AI Static

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - '.github/workflows/deploy-bio-ai-static.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.mjs'
      - 'tsconfig.json'

permissions:
  contents: write

concurrency:
  group: bio-ai-static-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Add nojekyll
        run: touch out/.nojekyll

      - name: Deploy to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true
          rm -rf .deploy-branch
          mkdir .deploy-branch
          cp -R out/. .deploy-branch/
          cd .deploy-branch
          git init
          git checkout -b gh-pages
          git add .
          git commit -m "Deploy ${GITHUB_SHA}" || echo "No changes to commit"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

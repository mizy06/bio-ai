name: Deploy Bio-AI Static

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'bio-ai-static/**'
      - 'frontend/src/lib/bioAiData.ts'
      - 'frontend/src/lib/bioAiDisplay.ts'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: bio-ai-static-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bio-ai-static
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bio-ai-static/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        env:
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: npm run build

      - name: Add nojekyll
        run: New-Item -ItemType File -Path out/.nojekyll -Force
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: bio-ai-static/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
